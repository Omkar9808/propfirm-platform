<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Journal | PropFirm Practice Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/dashboard/dashboard.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        secondary: '#1e293b',
                        accent: '#3b82f6',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primary text-white overflow-x-hidden">
    
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar bg-secondary border-r border-gray-700 transition-all duration-300">
            <!-- Logo -->
            <div class="sidebar-header p-4 border-b border-gray-700">
                <a href="/" class="flex items-center gap-3">
                    <div class="logo-icon">
                        <svg viewBox="0 0 40 40" fill="none" class="w-10 h-10">
                            <path d="M8 28L16 20L22 26L32 14" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                            <circle cx="32" cy="14" r="3" fill="#3b82f6"/>
                        </svg>
                    </div>
                    <span class="logo-text text-xl font-bold">PropFirm<span class="text-accent">Practice</span></span>
                </a>
                <button id="close-sidebar-mobile" class="mobile-close-btn lg:hidden">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Navigation Menu -->
            <nav class="sidebar-nav flex-1 py-4 overflow-y-auto">
                <ul class="space-y-1 px-3">
                    <li><button onclick="navigateTo('dashboard')" class="nav-item"><i class="fas fa-home nav-icon"></i><span class="nav-text">Dashboard</span></button></li>
                    <li><button onclick="navigateTo('challenges')" class="nav-item"><i class="fas fa-trophy nav-icon"></i><span class="nav-text">My Challenges</span></button></li>
                    <li><button onclick="navigateTo('metrics')" class="nav-item"><i class="fas fa-chart-bar nav-icon"></i><span class="nav-text">Trading Metrics</span></button></li>
                    <li><button onclick="navigateTo('journal')" class="nav-item active"><i class="fas fa-book nav-icon"></i><span class="nav-text">Trade Journal</span></button></li>
                    <li><button onclick="navigateTo('simulator')" class="nav-item"><i class="fas fa-calculator nav-icon"></i><span class="nav-text">Equity Simulator</span></button></li>
                    <li><button onclick="navigateTo('risk')" class="nav-item"><i class="fas fa-shield-alt nav-icon"></i><span class="nav-text">Risk Calculator</span></button></li>
                    <li><button onclick="navigateTo('leaderboard')" class="nav-item"><i class="fas fa-users nav-icon"></i><span class="nav-text">Leaderboard</span></button></li>
                    <li><button onclick="navigateTo('rules')" class="nav-item"><i class="fas fa-book-open nav-icon"></i><span class="nav-text">Rules</span></button></li>
                    <li><button onclick="navigateTo('settings')" class="nav-item"><i class="fas fa-cog nav-icon"></i><span class="nav-text">Account Settings</span></button></li>
                    <li><button onclick="navigateTo('support')" class="nav-item"><i class="fas fa-headset nav-icon"></i><span class="nav-text">Support</span></button></li>
                </ul>
            </nav>
            
            <!-- Logout Button -->
            <div class="sidebar-footer p-4 border-t border-gray-700">
                <button onclick="logout()" class="nav-item text-danger hover:bg-red-900/20">
                    <i class="fas fa-sign-out-alt nav-icon"></i>
                    <span class="nav-text">Logout</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            
            <!-- Top Bar -->
            <header class="topbar bg-secondary border-b border-gray-700 p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="toggle-sidebar" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fas fa-bars text-xl"></i>
                        </button>
                        <h1 id="page-title" class="text-xl font-bold">Trade Journal</h1>
                    </div>
                    
                    <button onclick="openAddTradeModal()" class="px-4 py-2 bg-accent hover:bg-blue-600 rounded-lg font-semibold transition-all flex items-center gap-2">
                        <i class="fas fa-plus-circle"></i>
                        Add Trade
                    </button>
                </div>
            </header>
            
            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto p-6">
                
                <!-- Statistics Summary -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="stat-card bg-secondary rounded-xl p-5 border border-gray-700" data-aos="fade-up">
                        <div class="flex items-center gap-3">
                            <div class="icon-box w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center">
                                <i class="fas fa-list text-blue-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Total Trades</p>
                                <h3 class="text-2xl font-bold" id="total-trades">0</h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="stat-card bg-secondary rounded-xl p-5 border border-gray-700" data-aos="fade-up" data-aos-delay="100">
                        <div class="flex items-center gap-3">
                            <div class="icon-box w-12 h-12 rounded-lg bg-green-500/20 flex items-center justify-center">
                                <i class="fas fa-check-circle text-green-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Win Rate</p>
                                <h3 class="text-2xl font-bold text-success" id="win-rate">0%</h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="stat-card bg-secondary rounded-xl p-5 border border-gray-700" data-aos="fade-up" data-aos-delay="200">
                        <div class="flex items-center gap-3">
                            <div class="icon-box w-12 h-12 rounded-lg bg-purple-500/20 flex items-center justify-center">
                                <i class="fas fa-chart-line text-purple-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Total P/L</p>
                                <h3 class="text-2xl font-bold" id="total-pl">$0.00</h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="stat-card bg-secondary rounded-xl p-5 border border-gray-700" data-aos="fade-up" data-aos-delay="300">
                        <div class="flex items-center gap-3">
                            <div class="icon-box w-12 h-12 rounded-lg bg-orange-500/20 flex items-center justify-center">
                                <i class="fas fa-balance-scale text-orange-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Profit Factor</p>
                                <h3 class="text-2xl font-bold" id="profit-factor">0.00</h3>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Trades Table -->
                <div class="bg-secondary rounded-xl p-6 border border-gray-700" data-aos="fade-up">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-bold flex items-center gap-2">
                            <i class="fas fa-book text-accent"></i>
                            All Trades
                        </h3>
                        <div class="flex gap-2">
                            <input type="text" id="search-trades" placeholder="Search trades..." class="bg-primary border border-gray-600 rounded-lg px-4 py-2 text-sm focus:border-accent focus:outline-none">
                            <select id="filter-pair" class="bg-primary border border-gray-600 rounded-lg px-4 py-2 text-sm focus:border-accent focus:outline-none">
                                <option value="">All Pairs</option>
                                <option value="EURUSD">EURUSD</option>
                                <option value="GBPUSD">GBPUSD</option>
                                <option value="USDJPY">USDJPY</option>
                                <option value="XAUUSD">XAUUSD</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="text-left text-gray-400 text-sm border-b border-gray-700">
                                    <th class="pb-3 pr-4">Date</th>
                                    <th class="pb-3 pr-4">Pair</th>
                                    <th class="pb-3 pr-4">Direction</th>
                                    <th class="pb-3 pr-4">Lot Size</th>
                                    <th class="pb-3 pr-4">Entry</th>
                                    <th class="pb-3 pr-4">Exit</th>
                                    <th class="pb-3 pr-4">P/L</th>
                                    <th class="pb-3 pr-4">RR</th>
                                    <th class="pb-3">Notes</th>
                                </tr>
                            </thead>
                            <tbody id="journal-trades-body">
                                <!-- Trades will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
            </main>
        </div>
    </div>
    
    <!-- Add Trade Modal -->
    <div id="add-trade-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-secondary rounded-xl p-6 w-full max-w-2xl mx-4 border border-gray-700" data-aos="zoom-in">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">Add New Trade</h2>
                <button onclick="closeAddTradeModal()" class="text-gray-400 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="add-trade-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Date *</label>
                        <input type="date" id="trade-date" required class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Pair *</label>
                        <input type="text" id="trade-pair" placeholder="EURUSD" required class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none uppercase">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Direction *</label>
                        <select id="trade-direction" required class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none">
                            <option value="">Select Direction</option>
                            <option value="BUY">BUY</option>
                            <option value="SELL">SELL</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Lot Size *</label>
                        <input type="number" id="trade-lot-size" step="0.01" placeholder="0.5" required class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Entry Price *</label>
                        <input type="number" id="trade-entry" step="0.0001" placeholder="1.0850" required class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Exit Price *</label>
                        <input type="number" id="trade-exit" step="0.0001" placeholder="1.0870" required class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Profit/Loss ($)</label>
                        <input type="number" id="trade-profit" step="0.01" placeholder="120.00" class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Risk Reward (R)</label>
                        <input type="text" id="trade-rr" placeholder="1:2" class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Trade Notes</label>
                    <textarea id="trade-notes" rows="3" placeholder="Entry reason, setup, emotions..." class="w-full bg-primary border border-gray-600 rounded-lg px-4 py-2 focus:border-accent focus:outline-none"></textarea>
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 py-3 bg-accent hover:bg-blue-600 rounded-lg font-semibold transition-all">
                        <i class="fas fa-save mr-2"></i>Save Trade
                    </button>
                    <button type="button" onclick="closeAddTradeModal()" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-semibold transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/components/sidebar.js"></script>
    <script src="/components/journal.js"></script>
    <script src="/dashboard/dashboard.js"></script>
</body>
</html>
