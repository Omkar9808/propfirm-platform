<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PropFirm Practice Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/dashboard/dashboard.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0b0f1a',
                        secondary: 'rgba(255, 255, 255, 0.03)',
                        accent: '#00ffa3',
                        'accent-cyan': '#00c3ff',
                        success: '#00ffa3',
                        danger: '#ff4757',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primary text-white overflow-x-hidden">
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="text-center">
            <div class="spinner mb-4"></div>
            <p class="text-lg font-semibold">Loading Dashboard...</p>
        </div>
    </div>
    
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar bg-secondary border-r border-gray-700 transition-all duration-300">
            <!-- Logo -->
            <div class="sidebar-header p-4 border-b border-gray-700">
                <a href="/" class="flex items-center gap-3">
                    <div class="logo-icon">
                        <svg viewBox="0 0 40 40" fill="none" class="w-10 h-10">
                            <path d="M8 28L16 20L22 26L32 14" stroke="#00ffa3" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                            <circle cx="32" cy="14" r="3" fill="#00ffa3"/>
                        </svg>
                    </div>
                    <span class="logo-text text-xl font-bold">PropFirm<span class="text-accent">Practice</span></span>
                </a>
                <button id="close-sidebar-mobile" class="mobile-close-btn lg:hidden">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Navigation Menu -->
            <nav class="sidebar-nav flex-1 py-4 overflow-y-auto">
                <ul class="space-y-1 px-3">
                    <li>
                        <button onclick="navigateTo('dashboard')" class="nav-item active">
                            <i class="fas fa-home nav-icon"></i>
                            <span class="nav-text">Dashboard</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('challenges')" class="nav-item">
                            <i class="fas fa-trophy nav-icon"></i>
                            <span class="nav-text">My Challenges</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('metrics')" class="nav-item">
                            <i class="fas fa-chart-bar nav-icon"></i>
                            <span class="nav-text">Trading Metrics</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('journal')" class="nav-item">
                            <i class="fas fa-book nav-icon"></i>
                            <span class="nav-text">Trade Journal</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('simulator')" class="nav-item">
                            <i class="fas fa-calculator nav-icon"></i>
                            <span class="nav-text">Equity Simulator</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('risk')" class="nav-item">
                            <i class="fas fa-shield-alt nav-icon"></i>
                            <span class="nav-text">Risk Calculator</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('leaderboard')" class="nav-item">
                            <i class="fas fa-list nav-icon"></i>
                            <span class="nav-text">Leaderboard</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('rules')" class="nav-item">
                            <i class="fas fa-book-open nav-icon"></i>
                            <span class="nav-text">Rules</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('settings')" class="nav-item">
                            <i class="fas fa-cog nav-icon"></i>
                            <span class="nav-text">Account Settings</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('support')" class="nav-item">
                            <i class="fas fa-headset nav-icon"></i>
                            <span class="nav-text">Support</span>
                        </button>
                    </li>
                    <li class="pt-4 mt-4 border-t border-gray-700">
                        <button onclick="logout()" class="nav-item w-full text-danger hover:bg-danger/10">
                            <i class="fas fa-sign-out-alt nav-icon"></i>
                            <span class="nav-text">Logout</span>
                        </button>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            
            <!-- Top Bar -->
            <header class="topbar bg-secondary border-b border-gray-700 p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="toggle-sidebar" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fas fa-bars text-xl"></i>
                        </button>
                        <h1 id="page-title" class="text-xl font-bold">Dashboard Overview</h1>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <!-- User Profile -->
                        <div class="flex items-center gap-3">
                            <div class="user-avatar w-10 h-10 rounded-full bg-gradient-to-br from-accent to-purple-600 flex items-center justify-center font-bold">
                                OM
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto p-6" id="main-content">
                
                <!-- Dynamic Content Container -->
                <div id="dashboardContent"></div>
                
            </main>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/components/dummyData.js"></script>
    <script src="/components/sidebar.js"></script>
    <script src="/dashboard/dashboard.js"></script>
</body>
</html>
