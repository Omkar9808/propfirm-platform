<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Prop Firm Challenge</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Simple Navigation for Auth Pages -->
    <nav class="auth-navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>PropFirm<span class="highlight">Challenge</span></h2>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account to continue</p>
                </div>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" value="demo@propfirm.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" value="demopass123" required>
                    </div>
                    
                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                    
                    <div class="divider">or continue with</div>
                    
                    <button type="button" class="btn btn-google">
                        <i class="fab fa-google"></i>
                        Continue with Google
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="/register">Register now</a></p>
                    <p><i class="fas fa-info-circle"></i> Demo credentials: demo@propfirm.com / demopass123</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer auth-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 PropFirmChallenge. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/public/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Demo credentials check
            if (email === 'demo@propfirm.com' && password === 'demopass123') {
                // Set login status in localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                
                // Redirect to dashboard
                window.location.href = '/dashboard';
            } else {
                // Simulate login process for any other credentials
                setTimeout(() => {
                    // Set login status in localStorage
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    
                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                }, 1000);
            }
        });
    </script>
</body>
</html>
