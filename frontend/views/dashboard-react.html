<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Terminal | Dashboard</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.10.3/umd/recharts.min.js"></script>
    
    <style>
        @keyframes countUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 157, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.6); }
        }
        .animate-count-up {
            animation: countUp 0.8s ease-out forwards;
        }
        .pulse-glow {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>PropFirm<span class="highlight">Challenge</span></h2>
        </div>
        <ul class="sidebar-menu">
            <li class="active"><a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="/accounts"><i class="fas fa-wallet"></i> My Accounts</a></li>
            <li><a href="/buy"><i class="fas fa-shopping-cart"></i> Buy Challenge</a></li>
            <li><a href="/leaderboard"><i class="fas fa-trophy"></i> Leaderboard</a></li>
            <li><a href="/affiliate"><i class="fas fa-users"></i> Affiliate</a></li>
            <li><a href="/certificates"><i class="fas fa-certificate"></i> Certificates</a></li>
            <li><a href="/settings"><i class="fas fa-cog"></i> Settings</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useMemo } = React;
        const { motion } = window.Motion;
        
        // Account Context
        const AccountContext = createContext();
        
        const accountsData = {
            account1: {
                id: '#12345',
                name: 'Account #12345 - $5K Challenge',
                accountSize: 5000,
                balance: 5000.00,
                equity: 5123.45,
                floatingPnL: 123.45,
                profit: 247,
                profitTarget: 800,
                profitTargetPercent: 8,
                dailyLoss: 115,
                maxDailyLoss: 250,
                drawdown: 90,
                maxDrawdown: 500,
                tradingDays: 7,
                minTradingDays: 10,
                startDate: 'Mar 1, 2026',
                dayNumber: 7,
                totalDays: 30,
                status: 'Active Phase 1',
                performanceStatus: 'Profitable',
                performanceChange: 2.47,
                winRate: 78,
                wins: 18,
                losses: 5,
                profitFactor: 2.34,
                disciplineScore: 87,
                avgTradeDuration: 4.2,
                profitPerTrade: 53.42,
                ruleCompliance: {
                    minTradingDays: true,
                    dailyLossLimit: true,
                    maxDrawdown: true
                }
            },
            account2: {
                id: '#67890',
                name: 'Account #67890 - $10K Challenge',
                accountSize: 10000,
                balance: 10000.00,
                equity: 10345.80,
                floatingPnL: 345.80,
                profit: 545,
                profitTarget: 800,
                profitTargetPercent: 8,
                dailyLoss: 85,
                maxDailyLoss: 500,
                drawdown: 150,
                maxDrawdown: 1000,
                tradingDays: 12,
                minTradingDays: 10,
                startDate: 'Feb 15, 2026',
                dayNumber: 12,
                totalDays: 30,
                status: 'Active Phase 1',
                performanceStatus: 'Profitable',
                performanceChange: 3.46,
                winRate: 82,
                wins: 23,
                losses: 5,
                profitFactor: 3.12,
                disciplineScore: 92,
                avgTradeDuration: 3.8,
                profitPerTrade: 67.89,
                ruleCompliance: {
                    minTradingDays: true,
                    dailyLossLimit: true,
                    maxDrawdown: true
                }
            },
            account3: {
                id: '#11111',
                name: 'Account #11111 - $25K Challenge',
                accountSize: 25000,
                balance: 25000.00,
                equity: 24875.50,
                floatingPnL: -124.50,
                profit: -124.50,
                profitTarget: 2000,
                profitTargetPercent: 8,
                dailyLoss: 124.50,
                maxDailyLoss: 1250,
                drawdown: 250,
                maxDrawdown: 2500,
                tradingDays: 5,
                minTradingDays: 10,
                startDate: 'Mar 5, 2026',
                dayNumber: 5,
                totalDays: 30,
                status: 'Active Phase 1',
                performanceStatus: 'Negative',
                performanceChange: -0.50,
                winRate: 45,
                wins: 5,
                losses: 6,
                profitFactor: 0.85,
                disciplineScore: 72,
                avgTradeDuration: 5.5,
                profitPerTrade: -45.23,
                ruleCompliance: {
                    minTradingDays: false,
                    dailyLossLimit: true,
                    maxDrawdown: true
                }
            }
        };
        
        const AccountProvider = ({ children }) => {
            const [selectedAccountId, setSelectedAccountId] = useState('account1');
            const [selectedAccount, setSelectedAccount] = useState(accountsData.account1);
            const [isUpdating, setIsUpdating] = useState(false);
            
            const switchAccount = (accountId) => {
                if (accountsData[accountId]) {
                    setIsUpdating(true);
                    setSelectedAccountId(accountId);
                    setSelectedAccount(accountsData[accountId]);
                    localStorage.setItem('selectedAccount', accountId);
                    
                    setTimeout(() => {
                        setIsUpdating(false);
                    }, 300);
                }
            };
            
            return (
                <AccountContext.Provider value={{ selectedAccountId, selectedAccount, switchAccount, accounts: accountsData, isUpdating }}>
                    {children}
                </AccountContext.Provider>
            );
        };
        
        // Dashboard Component
        const Dashboard = () => {
            const { selectedAccountId, switchAccount, accounts, isUpdating } = useContext(AccountContext);
            
            return (
                <motion.div
                    className="dashboard-container"
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    transition={{ duration: 0.5 }}
                >
                    <div className="top-bar mb-8">
                        <div className="menu-toggle">
                            <i className="fas fa-bars"></i>
                        </div>
                        <div className="account-selector">
                            <select
                                value={selectedAccountId}
                                onChange={(e) => switchAccount(e.target.value)}
                                className="bg-gray-900 border border-gray-800 rounded-lg px-4 py-2 text-sm focus:border-green-400 focus:outline-none transition-colors"
                            >
                                {Object.entries(accounts).map(([key, account]) => (
                                    <option key={key} value={key}>{account.name}</option>
                                ))}
                            </select>
                        </div>
                        <div className="user-info">
                            <i className="fas fa-user-circle"></i>
                            <span>John Doe</span>
                        </div>
                    </div>
                    
                    <div className={`transition-opacity duration-300 ${isUpdating ? 'opacity-50' : 'opacity-100'}`}>
                        <h1 className="text-3xl font-bold mb-6 flex items-center gap-3">
                            <i className="fas fa-home text-green-400"></i>
                            Trading Terminal Dashboard
                        </h1>
                        
                        {/* Overview Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            {/* Card components would go here */}
                        </div>
                    </div>
                </motion.div>
            );
        };
        
        // App Component
        const App = () => {
            return (
                <AccountProvider>
                    <Dashboard />
                </AccountProvider>
            );
        };
        
        // Mount the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <script src="/public/js/main.js"></script>
</body>
</html>
