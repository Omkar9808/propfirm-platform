<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Prop Firm Challenge</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Simple Navigation for Auth Pages -->
    <nav class="auth-navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>PropFirm<span class="highlight">Admin</span></h2>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Admin Access</h2>
                    <p>Sign in to your admin panel</p>
                </div>
                
                <form id="adminLoginForm" class="auth-form">
                    <div class="form-group">
                        <label for="adminEmail">Admin Email</label>
                        <input type="email" id="adminEmail" name="adminEmail" placeholder="Enter admin email" value="admin@propfirm.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="adminPassword">Password</label>
                        <input type="password" id="adminPassword" name="adminPassword" placeholder="Enter admin password" value="Omkar@079808" required>
                    </div>
                    
                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="rememberAdmin">
                            <label for="rememberAdmin">Remember me</label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">Access Admin Panel</button>
                </form>
                
                <div class="auth-footer">
                    <p><i class="fas fa-info-circle"></i> Demo credentials: admin@propfirm.com / Omkar@079808</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer auth-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 PropFirmChallenge Admin. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/public/js/main.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const remember = document.getElementById('rememberAdmin').checked;
            
            // Demo admin credentials
            if (email === 'admin@propfirm.com' && password === 'Omkar@079808') {
                // Set admin login status in localStorage
                localStorage.setItem('isAdminLoggedIn', 'true');
                localStorage.setItem('adminEmail', email);
                
                // Redirect to admin dashboard
                window.location.href = '/admin';
            } else {
                alert('Invalid admin credentials. Please use: admin@propfirm.com / Omkar@079808');
            }
        });
    </script>
</body>
</html>
